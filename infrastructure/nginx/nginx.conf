worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    # ==========================================
    # General Settings
    # ==========================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ==========================================
    # Upstream Backends
    # ==========================================
    upstream game_server {
        server game-server:3000;
        # For horizontal scaling, add more:
        # server game-server-2:3000;
    }

    upstream api_server {
        server api-server:3001;
    }

    upstream crypto_service {
        server crypto-service:3002;
    }

    # ==========================================
    # WebSocket Connection Upgrade Map
    # ==========================================
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ==========================================
    # Server Block
    # ==========================================
    server {
        listen 80;
        server_name _;

        # ------------------------------------------
        # WebSocket — Game Server
        # Route: /ws → game-server:3000
        # ------------------------------------------
        location /ws {
            proxy_pass http://game_server;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Preserve client info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long-lived connection timeouts
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Disable buffering for real-time data
            proxy_buffering off;
        }

        # ------------------------------------------
        # REST API — Crypto Verification (public)
        # Route: /api/crypto → crypto-service:3002
        # ------------------------------------------
        location /api/crypto/ {
            proxy_pass http://crypto_service/api/crypto/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 30s;
        }

        # ------------------------------------------
        # REST API — Auth, Wallet, History, Fairness
        # Route: /api → api-server:3001
        # ------------------------------------------
        location /api/ {
            proxy_pass http://api_server/api/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 30s;
        }

        # ------------------------------------------
        # Health Check
        # ------------------------------------------
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
